<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COPILOT QUEST</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DotGothic16&family=Press+Start+2P&display=swap');

:root{
  --bg:#07070f;
  --window:#0c0c1a;
  --window2:#13132a;
  --frame:#ffffff;
  --ink:#f4f4ff;
  --gold:#c9a84c;
  --gold-bright:#ffd24a;
  --exp:#5bd16a;
  --exp-dark:#1e5c2a;
  --mp:#5aa9ff;
  --dim:#7d7da0;
  --stamp:#ff5566;
  --jp:'DotGothic16',monospace;
  --px:'Press Start 2P',monospace;
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:
    radial-gradient(circle at 50% -10%, #1a1a3a 0%, var(--bg) 60%),
    var(--bg);
  color:var(--ink);
  font-family:var(--jp);
  display:flex;justify-content:center;
  padding:18px 12px 60px;
  -webkit-font-smoothing:none;
  image-rendering:pixelated;
  line-height:1.5;
}
/* faint scanlines */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:9;
  background:repeating-linear-gradient(0deg, rgba(0,0,0,.18) 0 1px, transparent 1px 3px);
  mix-blend-mode:multiply;opacity:.5;
}
.wrap{width:100%;max-width:660px}

/* ---------- DQ window frame ---------- */
.dq{
  position:relative;background:var(--window);
  border:3px solid var(--frame);border-radius:9px;
  padding:14px 16px;margin-bottom:14px;
  box-shadow:0 4px 0 rgba(0,0,0,.6), 0 0 22px rgba(90,90,160,.25);
}
.dq::after{
  content:'';position:absolute;inset:3px;border:1px solid rgba(255,255,255,.22);
  border-radius:5px;pointer-events:none;
}

/* ---------- title ---------- */
.title{
  text-align:center;border:none;background:transparent;margin-bottom:16px;
}
.title h1{
  font-family:var(--px);font-size:clamp(15px,4.6vw,26px);color:var(--gold-bright);
  letter-spacing:1px;line-height:1.4;
  text-shadow:3px 3px 0 #5a3d00, 0 0 14px rgba(255,210,74,.4);
}
.title .sub{font-size:12px;color:var(--dim);margin-top:8px;letter-spacing:2px}
.title .star{color:var(--gold)}

/* ---------- status ---------- */
.status{display:flex;gap:14px;align-items:center}
.hero{flex:0 0 64px;display:flex;flex-direction:column;align-items:center;gap:6px}
.blob{width:60px;height:60px;animation:bob 1.1s steps(2) infinite}
@keyframes bob{0%{transform:translateY(0)}50%{transform:translateY(-5px)}100%{transform:translateY(0)}}
.statgrid{flex:1;display:grid;grid-template-columns:auto 1fr;gap:5px 12px;font-size:13.5px;align-items:baseline}
.statgrid .lbl{color:var(--dim);white-space:nowrap}
.statgrid .val{color:var(--ink)}
.statgrid .job{color:var(--gold-bright)}
.lvnum{font-family:var(--px);font-size:15px;color:var(--gold-bright)}
.gc{cursor:pointer;border-bottom:1px dotted var(--dim)}
.gc:hover{color:var(--gold-bright)}
.gcwrap{display:inline-flex;align-items:center;gap:6px}
.gcbtn{font-family:var(--px);font-size:9px;background:#000;color:var(--ink);
  border:2px solid var(--frame);border-radius:4px;width:20px;height:20px;cursor:pointer;line-height:1}
.gcbtn:active{transform:translateY(1px)}

/* ---------- EXP bar ---------- */
.expwrap{margin-top:4px}
.exprow{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--dim);margin-bottom:6px}
.exprow b{color:var(--exp);font-family:var(--px);font-size:11px}
.bar{height:18px;background:#000;border:2px solid var(--frame);border-radius:5px;overflow:hidden;position:relative}
.fill{height:100%;width:0%;background:
   linear-gradient(180deg,#8cf09a 0%, var(--exp) 45%, var(--exp-dark) 100%);
   transition:width .55s cubic-bezier(.2,.9,.25,1);
   box-shadow:inset 0 0 0 1px rgba(255,255,255,.25)}
.totbar .fill{background:linear-gradient(180deg,#ffe27a 0%,var(--gold) 50%,#7a5e10 100%)}

/* ---------- level tabs ---------- */
.tabs{display:flex;gap:7px;justify-content:center;margin-bottom:14px;flex-wrap:wrap}
.tab{
  font-family:var(--px);font-size:11px;color:var(--ink);
  background:var(--window2);border:2px solid var(--frame);border-radius:6px;
  width:42px;height:42px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;position:relative;transition:transform .1s}
.tab small{position:absolute;bottom:2px;right:3px;font-size:7px;color:var(--dim);font-family:var(--px)}
.tab.active{background:var(--gold);color:#1a1400;border-color:var(--gold-bright);box-shadow:0 0 12px rgba(255,210,74,.6)}
.tab.locked{color:var(--dim);cursor:not-allowed;opacity:.6}
.tab.done::after{content:'✓';position:absolute;top:1px;left:4px;font-size:9px;color:var(--exp)}
.tab:not(.locked):hover{transform:translateY(-2px)}

/* ---------- quest list ---------- */
.qhead{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:10px;flex-wrap:wrap;gap:4px}
.qhead .lv{font-family:var(--px);font-size:12px;color:var(--gold-bright)}
.qhead .jb{font-size:18px;color:var(--gold-bright)}
.qhead .sb{font-size:12px;color:var(--dim)}

.q{
  display:flex;gap:10px;align-items:flex-start;
  padding:11px 10px;border:2px solid transparent;border-radius:6px;
  background:rgba(255,255,255,.025);margin-bottom:9px;transition:background .2s}
.q:hover{background:rgba(90,90,160,.14)}
.cur{flex:0 0 14px;color:var(--gold-bright);font-size:14px;line-height:1.6;visibility:hidden}
.q:hover .cur{visibility:visible;animation:blink .6s steps(1) infinite}
@keyframes blink{50%{opacity:0}}
.qtext{flex:1;font-size:14px;color:var(--ink)}
.qbtn{
  flex:0 0 auto;align-self:center;
  font-family:var(--px);font-size:10px;color:#1a1400;
  background:var(--gold-bright);border:2px solid #fff;border-radius:5px;
  padding:8px 11px;cursor:pointer;white-space:nowrap;
  box-shadow:0 3px 0 #7a5e10}
.qbtn:hover{background:#fff;color:#000}
.qbtn:active{transform:translateY(2px);box-shadow:0 1px 0 #7a5e10}

.q.cleared{background:rgba(91,209,106,.08);border-color:rgba(91,209,106,.35)}
.q.cleared .qtext{color:var(--dim);text-decoration:line-through;text-decoration-color:rgba(91,209,106,.5)}
.q.cleared .cur{visibility:visible;color:var(--exp);animation:none}
.q.cleared .qbtn{
  background:transparent;color:var(--exp);border-color:var(--exp);
  box-shadow:none;cursor:default;pointer-events:none}

.locked-msg{text-align:center;color:var(--dim);font-size:14px;padding:26px 10px}
.locked-msg .big{font-family:var(--px);font-size:13px;color:var(--gold);display:block;margin-bottom:10px}

/* footer */
.foot{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--dim)}
.reset{font-family:var(--jp);font-size:12px;color:var(--dim);background:none;border:1px solid var(--dim);
  border-radius:4px;padding:4px 9px;cursor:pointer}
.reset:hover{color:var(--stamp);border-color:var(--stamp)}

/* floating +pts */
.pop{position:fixed;font-family:var(--px);font-size:13px;color:var(--exp);
  pointer-events:none;z-index:30;text-shadow:1px 1px 0 #000;animation:rise 1s ease-out forwards}
@keyframes rise{0%{opacity:0;transform:translateY(6px) scale(.8)}15%{opacity:1}100%{opacity:0;transform:translateY(-34px) scale(1.1)}}

/* level up overlay */
.overlay{position:fixed;inset:0;z-index:40;display:none;align-items:center;justify-content:center;
  background:rgba(2,2,12,.86);padding:20px}
.overlay.show{display:flex;animation:flash .5s steps(2) 2}
@keyframes flash{50%{background:rgba(120,120,220,.5)}}
.lvup{max-width:420px;width:100%;text-align:center}
.lvup .ding{font-family:var(--px);font-size:clamp(14px,4.5vw,20px);color:var(--gold-bright);
  text-shadow:2px 2px 0 #5a3d00;line-height:1.6;margin-bottom:16px;animation:pulse .8s steps(2) infinite}
@keyframes pulse{50%{transform:scale(1.06)}}
.lvup .blob{width:84px;height:84px;margin:0 auto 14px}
.lvup .nj{font-size:20px;color:var(--ink);margin-bottom:6px}
.lvup .nj b{color:var(--gold-bright)}
.lvup .gain{font-size:13px;color:var(--exp);margin-bottom:18px;font-family:var(--px)}
.okbtn{font-family:var(--px);font-size:11px;color:#1a1400;background:var(--gold-bright);
  border:2px solid #fff;border-radius:6px;padding:11px 20px;cursor:pointer;box-shadow:0 4px 0 #7a5e10}
.okbtn:active{transform:translateY(2px);box-shadow:0 2px 0 #7a5e10}

/* clear-all banner */
.clearbanner{display:none;text-align:center;border-color:var(--gold-bright)}
.clearbanner.show{display:block;animation:pulse 1s steps(2) infinite}
.clearbanner h2{font-family:var(--px);font-size:14px;color:var(--gold-bright);line-height:1.6;margin-bottom:8px}
.clearbanner p{font-size:13px;color:var(--ink)}

@media (max-width:480px){
  .qbtn{font-size:9px;padding:7px 8px}
  .qtext{font-size:13px}
  .status{gap:9px}
}
@media (prefers-reduced-motion:reduce){
  *{animation:none!important;transition:none!important}
}
</style>
</head>
<body>
<div class="wrap">

  <div class="title dq" style="border:none;box-shadow:none;background:none">
    <h1><span class="star">★</span> COPILOT QUEST <span class="star">★</span></h1>
    <div class="sub">～ じどうか・そしきか への ぼうけん ～</div>
  </div>

  <!-- STATUS -->
  <div class="dq">
    <div class="status">
      <div class="hero">
        <svg class="blob" id="heroBlob" viewBox="0 0 24 24" aria-hidden="true"></svg>
      </div>
      <div class="statgrid">
        <div class="lbl">なまえ</div><div class="val">タイタン</div>
        <div class="lbl">しょくぎょう</div><div class="val job" id="jobName">みならい</div>
        <div class="lbl">レベル</div><div class="val"><span class="lvnum" id="lvNum">1</span> <span style="color:var(--dim);font-size:11px">/ 5</span></div>
        <div class="lbl">つくったゲーム</div>
        <div class="val">
          <span class="gcwrap">
            <button class="gcbtn" id="gcMinus" aria-label="へらす">−</button>
            <span class="gc" id="gameCount" title="クリックで直接入力">80</span><span style="color:var(--dim)"> ほん</span>
            <button class="gcbtn" id="gcPlus" aria-label="ふやす">＋</button>
          </span>
        </div>
      </div>
    </div>

    <div class="expwrap">
      <div class="exprow"><span>つぎの レベルまで</span><b id="expLabel">0 / 5</b></div>
      <div class="bar"><div class="fill" id="expFill"></div></div>
    </div>
  </div>

  <!-- LEVEL TABS -->
  <div class="tabs" id="tabs"></div>

  <!-- CLEAR BANNER -->
  <div class="dq clearbanner" id="clearBanner">
    <h2>★ ぜんクリア！ ★</h2>
    <p>でんせつの「じどうか アーキテクト（FDE）」に なった！<br>あたらしい クエストを じぶんで つくろう。</p>
  </div>

  <!-- QUEST LIST -->
  <div class="dq" id="questPanel">
    <div class="qhead">
      <div>
        <div class="lv" id="qLv">LEVEL 1</div>
        <div class="jb" id="qJob">みならい</div>
      </div>
      <div class="sb" id="qSub">～ じどうかの いっぽ ～</div>
    </div>
    <div id="qList"></div>
  </div>

  <!-- TOTAL -->
  <div class="dq">
    <div class="exprow"><span>そうとっぱ</span><b id="totLabel" style="color:var(--gold-bright)">0 / 25</b></div>
    <div class="bar totbar"><div class="fill" id="totFill"></div></div>
    <div class="foot" style="margin-top:12px">
      <span id="weekNote">ルール：1しゅうに 5チャレンジ クリアで レベルアップ</span>
      <button class="reset" id="resetBtn">さいしょから</button>
    </div>
  </div>

</div>

<!-- LEVEL UP OVERLAY -->
<div class="overlay" id="overlay">
  <div class="lvup">
    <svg class="blob" id="upBlob" viewBox="0 0 24 24" aria-hidden="true"></svg>
    <div class="ding" id="dingText">レベルが あがった！</div>
    <div class="nj">タイタンは <b id="newJob">せんし</b> になった！</div>
    <div class="gain" id="gainText">じどうかP +100</div>
    <button class="okbtn" id="okBtn">▶ つづける</button>
  </div>
</div>

<script>
/* ============ DATA ============ */
const LEVELS = [
  { lv:1, job:'みならい', sub:'～ じどうかの だいいっぽ ～', color:'#5aa9ff', quests:[
    'Outlook Copilotで、よく来る定型問い合わせ3種の返信を下書き自動化する',
    'Power Automateで「件名に"領収書"を含むメール添付を指定SharePointフォルダへ自動保存」を1本つくる',
    'Teams会議Copilotのリキャップ→要点・タスク抽出をNotion/OneNoteに自動で残す導線をつくる',
    'Excel Copilotで日報から「急変・異常値のLP」を自動ハイライトする仕組みをつくる',
    'Power Automateのテンプレギャラリーから1つ採用し、自分の定例作業に当てて動かす',
  ]},
  { lv:2, job:'せんし', sub:'～ しくみの ひょうじゅんか ～', color:'#7bd06a', quests:[
    'SharePointのSkillで「原稿レビュー（TPP18ガイドライン適合チェック）」を作りSKILL.md化する',
    '承認フロー（Teamsアダプティブカード＋自動リマインド）を1本テンプレ化する',
    'Forms＋Power Automateで「研修の事前・事後課題リマインド」を自動化する',
    '法人Copilotプロンプト集を部署共有用（SharePoint/Loopページ）に整理する',
    'Word CopilotでLP向け案内文・通知文の社内標準テンプレをつくる',
  ]},
  { lv:3, job:'まほうつかい', sub:'～ データれんけいの じどうか ～', color:'#b98bff', quests:[
    'Forms回答→Excel/SharePointリスト自動集計→Teams通知を1本のフローでつなぐ',
    'TPP18 survey未回答者を自動抽出し、対象者だけにリマインドを送るフローをつくる',
    'Power Query（A+B→C）の月次集計を、月初に自動レポート送信するスケジュールフローにする',
    'LP日報→Excel Copilot→自然言語サマリーを週次で自動生成するルーチンをつくる',
    'SharePointリスト（LP/地域マスタ）を「単一の真実の源」にして複数フローから参照する',
  ]},
  { lv:4, job:'けんじゃ', sub:'～ チームへの てんかい ～', color:'#ffb24a', quests:[
    'Copilot Studio/Agent Builderで「TPP18 Q&A 宣言型エージェント」を作る（SharePoint知識源）',
    'エージェントを部署カタログに公開申請し、LP数名に試用してもらいFBを集める',
    '7地域のうち1地域で自動化レシピを試験導入し、効果を1指標で測る',
    'Copilot Cowork（管理者有効化後）で「集計→分析→ドラフト」の多段タスクを丸投げ検証する',
    'Power Automateフローを共同所有者追加でチーム共有し、属人化を解消する',
  ]},
  { lv:5, job:'ゆうしゃ', sub:'～ そしきおうだんの アーキテクト ～', color:'#ffd24a', quests:[
    '2部署以上をまたぐ自動化フローを設計し、部署間のデータ受け渡しを自動化する',
    'LP AIスキル評価（L6–L1）を、エージェント＋フローで「提出→判定→記録」まで半自動化する',
    '自動化レシピを「再現可能な手順書＋テンプレ」として組織ナレッジ（SharePoint/Notion）化する',
    'A社コラボ相手 or 他部署に仕組みを1つ移植し、横展開の型をつくる',
    '一連の自動化・組織化の成果をFDEポートフォリオに「課題→設計→効果」の1事例として追加する',
  ]},
];
const PTS = 20; // per quest
const NEXT_JOB = ['せんし','まほうつかい','けんじゃ','ゆうしゃ','でんせつ'];

/* ============ STATE ============ */
const KEY='copilot_quest_v1';
let S = null, memFallback=null;

function defaultState(){
  return { unlocked:1, view:1, gameCount:80, started:new Date().toISOString().slice(0,10),
           done:{1:[],2:[],3:[],4:[],5:[]} };
}
async function load(){
  try{
    if(window.storage && window.storage.get){
      const r = await window.storage.get(KEY);
      if(r && r.value) return JSON.parse(r.value);
    }
  }catch(e){}
  if(memFallback) return memFallback;
  return defaultState();
}
async function save(){
  memFallback = S;
  try{ if(window.storage && window.storage.set){ await window.storage.set(KEY, JSON.stringify(S)); } }catch(e){}
}

/* ============ AUDIO (8-bit blips) ============ */
let actx;
function tone(freq,dur,type,vol){
  try{
    actx = actx || new (window.AudioContext||window.webkitAudioContext)();
    const o=actx.createOscillator(), g=actx.createGain();
    o.type=type||'square'; o.frequency.value=freq;
    g.gain.value=vol||0.05; o.connect(g); g.connect(actx.destination);
    const t=actx.currentTime; o.start(t);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur); o.stop(t+dur);
  }catch(e){}
}
function sfxClear(){ tone(620,0.08,'square'); setTimeout(()=>tone(880,0.11,'square'),65); }
function sfxLevelUp(){ [523,659,784,1046,1318].forEach((f,i)=>setTimeout(()=>tone(f,0.16,'square',0.06),i*110)); }
function sfxTick(){ tone(440,0.04,'square',0.03); }

/* ============ BLOB SPRITE ============ */
function blobSVG(color){
  return `
   <g shape-rendering="crispEdges">
     <rect x="8" y="4" width="8" height="2" fill="${color}"/>
     <rect x="6" y="6" width="12" height="2" fill="${color}"/>
     <rect x="5" y="8" width="14" height="2" fill="${color}"/>
     <rect x="4" y="10" width="16" height="2" fill="${color}"/>
     <rect x="3" y="12" width="18" height="2" fill="${color}"/>
     <rect x="3" y="14" width="18" height="2" fill="${color}"/>
     <rect x="2" y="16" width="20" height="2" fill="${color}"/>
     <rect x="2" y="18" width="20" height="2" fill="${color}"/>
     <rect x="8" y="11" width="2" height="3" fill="#fff"/>
     <rect x="14" y="11" width="2" height="3" fill="#fff"/>
     <rect x="9" y="12" width="1" height="1" fill="#000"/>
     <rect x="15" y="12" width="1" height="1" fill="#000"/>
     <rect x="10" y="16" width="4" height="1" fill="rgba(0,0,0,.45)"/>
   </g>`;
}

/* ============ RENDER ============ */
const $=id=>document.getElementById(id);

function curLevelObj(){ return LEVELS[S.view-1]; }
function doneCount(lv){ return (S.done[lv]||[]).length; }
function totalDone(){ return [1,2,3,4,5].reduce((a,l)=>a+doneCount(l),0); }
function curColor(){ return curLevelObj().color; }

function renderStatus(){
  const lvNow = S.unlocked;
  const cleared = S.unlocked>5;
  $('lvNum').textContent = Math.min(S.unlocked,5);
  $('jobName').textContent = LEVELS[Math.min(S.unlocked,5)-1].job;
  $('gameCount').textContent = S.gameCount;
  $('heroBlob').innerHTML = blobSVG(LEVELS[Math.min(S.unlocked,5)-1].color);

  // exp = progress of the current unlocked level toward level-up
  let d = cleared?5:doneCount(S.unlocked);
  $('expLabel').textContent = cleared ? 'MAX' : (d+' / 5');
  $('expFill').style.width = (d/5*100)+'%';

  $('totLabel').textContent = totalDone()+' / 25';
  $('totFill').style.width = (totalDone()/25*100)+'%';
}

function renderTabs(){
  const t=$('tabs'); t.innerHTML='';
  LEVELS.forEach(L=>{
    const b=document.createElement('button');
    const locked = L.lv>S.unlocked;
    const full = doneCount(L.lv)>=5;
    b.className='tab'+(L.lv===S.view?' active':'')+(locked?' locked':'')+(full?' done':'');
    b.innerHTML = (locked?'🔒':L.lv);
    if(!locked){ b.onclick=()=>{ sfxTick(); S.view=L.lv; save(); render(); }; }
    t.appendChild(b);
  });
}

function renderQuests(){
  const L=curLevelObj();
  $('qLv').textContent='LEVEL '+L.lv;
  $('qJob').textContent=L.job;
  $('qJob').style.color=L.color;
  $('qSub').textContent=L.sub;
  const list=$('qList'); list.innerHTML='';

  if(L.lv>S.unlocked){
    list.innerHTML='<div class="locked-msg"><span class="big">？？？</span>このレベルは まだ ふういんされている。<br>いまの レベルの 5つを すべて クリアすると ひらく！</div>';
    return;
  }

  L.quests.forEach((text,i)=>{
    const done=(S.done[L.lv]||[]).includes(i);
    const row=document.createElement('div');
    row.className='q'+(done?' cleared':'');
    row.innerHTML=`
      <span class="cur">${done?'✓':'▶'}</span>
      <span class="qtext">${text}</span>
      <button class="qbtn">${done?'✓ クリア！':'けってい ▶'}</button>`;
    if(!done){
      row.querySelector('.qbtn').onclick=(e)=>clearQuest(L.lv,i,e);
    }
    list.appendChild(row);
  });
}

function render(){ renderStatus(); renderTabs(); renderQuests();
  $('clearBanner').classList.toggle('show', S.unlocked>5);
}

/* ============ ACTIONS ============ */
function popPoints(x,y,txt){
  const p=document.createElement('div');
  p.className='pop'; p.textContent=txt;
  p.style.left=(x-20)+'px'; p.style.top=(y-14)+'px';
  document.body.appendChild(p);
  setTimeout(()=>p.remove(),1000);
}

function clearQuest(lv,i,ev){
  if(!S.done[lv]) S.done[lv]=[];
  if(S.done[lv].includes(i)) return;
  S.done[lv].push(i);
  sfxClear();
  const r=ev.target.getBoundingClientRect();
  popPoints(r.left+r.width/2, r.top, '+'+PTS+'P');
  save();
  render();
  // level up?
  if(lv===S.unlocked && doneCount(lv)>=5){
    setTimeout(()=>levelUp(),420);
  }
}

function levelUp(){
  const finishedLevel=S.unlocked;
  S.unlocked++;
  S.view=Math.min(S.unlocked,5);
  S.started=new Date().toISOString().slice(0,10);
  save();
  sfxLevelUp();
  const isFinal = finishedLevel>=5;
  $('upBlob').innerHTML = blobSVG(LEVELS[Math.min(S.unlocked,5)-1].color);
  $('dingText').textContent = isFinal ? '★ ぜんクリア！ ★' : 'レベルが あがった！';
  $('newJob').textContent = isFinal ? 'でんせつのFDE' : LEVELS[S.unlocked-1].job;
  $('gainText').textContent = isFinal ? 'じどうかP +100　MAX' : 'じどうかP +100';
  $('overlay').classList.add('show');
  render();
}

/* ============ GAME COUNT (editable, "保管") ============ */
function setGameCount(n){
  n=Math.max(0,Math.floor(n||0));
  S.gameCount=n; save(); renderStatus();
}
$('gcPlus').onclick=()=>{ sfxTick(); setGameCount(S.gameCount+1); };
$('gcMinus').onclick=()=>{ sfxTick(); setGameCount(S.gameCount-1); };
$('gameCount').onclick=()=>{
  const v=prompt('GitHub Games の最新本数を入力（保管されます）', S.gameCount);
  if(v!==null && v.trim()!=='' && !isNaN(v)) setGameCount(parseInt(v,10));
};

/* ============ BUTTONS ============ */
$('okBtn').onclick=()=>{ $('overlay').classList.remove('show'); render(); };
$('resetBtn').onclick=()=>{
  if(confirm('ぼうけんのしょは きえてしまいます。さいしょから やりなおしますか？')){
    S=defaultState(); save(); render();
  }
};

/* ============ INIT ============ */
(async function(){
  S = await load();
  // sanity
  if(!S || !S.done){ S=defaultState(); }
  [1,2,3,4,5].forEach(l=>{ if(!Array.isArray(S.done[l])) S.done[l]=[]; });
  if(!S.unlocked) S.unlocked=1;
  if(!S.view || S.view>Math.min(S.unlocked,5)) S.view=Math.min(S.unlocked,5);
  render();
})();
</script>
</body>
</html>
